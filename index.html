<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>우진이의 이야기 도서관</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <section id="library" class="screen active">
      <div class="hero">
        <p class="eyebrow">WooJin Story Library</p>
        <h1>우진이의 이야기 도서관</h1>
        <p class="sub">아빠와 함께 계속 업데이트하는 디지털 동화책</p>
      </div>
      <div id="bookshelf" class="bookshelf"></div>
      <p class="tip">책 표지를 누르면 이야기가 시작돼요.</p>
    </section>

    <section id="reader" class="screen">
      <header class="reader-top">
        <button id="backBtn" class="ghost">← 책장</button>
        <div>
          <strong id="bookTitle"></strong>
          <span id="pageCounter"></span>
        </div>
        <button id="soundBtn" class="ghost">🔈 소리</button>
      </header>

      <main class="stage" id="stage">
        <div id="effects" class="effects"></div>
        <article id="page" class="page-card">
          <img id="pageImg" alt="" />
          <div class="story-box">
            <p id="pageKicker"></p>
            <h2 id="pageTitle"></h2>
            <p id="pageText"></p>
          </div>
        </article>
        <button id="prevTap" class="tap-zone left" aria-label="이전 페이지"></button>
        <button id="nextTap" class="tap-zone right" aria-label="다음 페이지"></button>
      </main>

      <footer class="reader-bottom">
        <button id="prevBtn">← 이전</button>
        <div id="dots" class="dots"></div>
        <button id="nextBtn">다음 →</button>
      </footer>
    </section>
  </div>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#06172f" />
  <title>우진이의 기차 여행</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="app">
    <div id="particles" class="particles"></div>

    <section id="intro" class="intro">
      <div class="cloud c1"></div><div class="cloud c2"></div>
      <div class="intro-card">
        <p class="eyebrow">아빠와 함께 만든 첫 번째 그림책</p>
        <h1>우진이의<br>기차 여행</h1>
        <p>봄, 여름, 가을, 겨울을 지나 행복역으로 떠나요.</p>
        <button id="startBtn" class="start-btn">📖 여행 시작하기</button>
      </div>
      <div class="intro-train">🚂</div>
    </section>

    <main id="reader" class="reader hidden" aria-live="polite">
      <header class="reader-top">
        <button id="homeBtn" class="round">⌂</button>
        <div><strong id="bookTitle">우진이의 기차 여행</strong><span id="chapter">표지</span></div>
        <button id="soundBtn" class="round">🔇</button>
      </header>

      <div id="book" class="book"></div>

      <button id="prevZone" class="zone left" aria-label="이전"></button>
      <button id="nextZone" class="zone right" aria-label="다음"></button>

      <footer class="reader-bottom">
        <button id="prevBtn" class="nav">← 이전</button>
        <div class="progress"><span id="progressBar"></span></div>
        <span id="counter" class="counter">1 / 6</span>
        <button id="nextBtn" class="nav primary">다음 →</button>
      </footer>
    </main>

    <section id="album" class="album hidden">
      <h2>우진이의 진짜 추억</h2>
      <p>그림책이 끝나면 실제 사진으로 다시 만나는 우진이의 하루.</p>
      <div id="albumGrid" class="album-grid"></div>
      <button id="restartBtn" class="start-btn small">처음부터 다시 보기</button>
    </section>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
